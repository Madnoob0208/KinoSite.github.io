<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт для получения информации о фильмах">
    <meta name="keywords" content="кино смотреть фильм кинопоиск киносайт">
    <meta property="og:title" content="КиноСайт - поиск лучших фильмов">
    <title>КиноСайт</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
</head>

<body>
    <div class="header-placeholder"></div>
    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero__title">КиноСайт</h1>
                <p class="hero__subtitle">Окунись в огромный мир кино</p>
                <a class="hero__cta" href="#subscribe">Подписаться</a>
            </div>
        </section>
        <section class="films" id="films">
            <div class="container">
                <h2 class="films__title title">Наши фильмы</h2>
                <div class="films__cards">
                </div>
                <div class="films__pagination">
                    <div class="films__pagination-number number-1 number--active">1</div>
                    <div class="films__pagination-number number-2">2</div>
                    <div class="films__pagination-number number-3">3</div>
                    <div class="films__pagination-number number-4">4</div>
                    <div class="films__pagination-number number-5">5</div>
                </div>
            </div>
        </section>
        <div class="subscribe-placeholder"></div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="js/get-block.js"></script>
    <script src="js/script.js"></script>
</body>
</html>

<section class="subscribe" id="subscribe">
    <div class="container">
        <h2 class="subscribe__title title">Подписаться на рассылку</h2>
        <div class="subscribe__wrapper">
            <p class="subscribe__text">Получать новости о новинках</p>
            <form class="subscribe__form">
                <input class="subscribe__form-input" id="form-inputName" placeholder="Имя" type="text">
                <input class="subscribe__form-input" id="form-inputEmail" placeholder="Электронная почта" type="email">
                <button class="subscribe__form-btn">Подписаться</button>
            </form>
        </div>
    </div>
</section>

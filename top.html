<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Киносайт | Топ-25</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/top.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body>
    <div class="header-placeholder"></div>
    <main class="main">
        <section class="filters">
            <div class="container">
                <div class="filters__wrapper">
                    <h1 class="filters__title">Топ-25 фильмов</h1>
                    <div class="filters__inputs">
                        <input class="filters__input input-year" placeholder="Год" type="number">
                        <input class="filters__input input-title" placeholder="Название" type="text">
                    </div>
                </div>
            </div>
        </section>
        <section class="top">
            <div class="container">
                <div class="top__cards">
                </div>
                <div class="films__pagination">
                    <div class="films__pagination-number prev"><</div>
                    <div class="films__pagination-number number--active">1</div>
                    <div class="films__pagination-number">2</div>
                    <div class="films__pagination-number">3</div>
                    <div class="films__pagination-number next">></div>
                </div>
            </div>
        </section>
        <div class="subscribe-placeholder"></div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="js/get-block.js"></script>
    <script src="js/top.js"></script>
</body>
</html>
